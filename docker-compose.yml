services:
  postgres:
    image: postgres:16-alpine
    container_name: quantum-swarm-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: quantum_user
      POSTGRES_PASSWORD: quantum_password
      POSTGRES_DB: quantum_swarm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantum_user -d quantum_swarm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
