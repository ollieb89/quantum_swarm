# OpenClaw Financial Swarm Configuration
# Main configuration file for the Multi-Agent Trading System

# OpenClaw Gateway Configuration
openclaw:
  gateway_url: "http://127.0.0.1:18789"
  api_token: "${OPENCLAW_API_TOKEN}"
  timeout: 30
  retry_attempts: 3

# L1 Orchestrator Configuration
orchestrator:
  model: "claude-sonnet-4-20250514"
  max_tokens: 4000
  temperature: 0.7
  thinking_mode: "medium"

  # Intent Classification
  intent_patterns:
    trade: ["trade", "buy", "sell", "long", "short", "enter", "exit"]
    analysis: ["analyze", "look at", "check", "review", "evaluate"]
    macro: ["macro", "economy", "fed", "cpi", "nfp", "gdp"]
    risk: ["risk", "exposure", "limit", "drawdown", "volatility"]

  # Consensus Thresholds
  thresholds:
    min_consensus: 0.0
    hard_risk_limit: 0.8
    min_sample_size: 5

# L2 Agent Configuration
agents:
  macro_analyst:
    id: "l2-macro-analyst"
    skills:
      - "market-environment-analysis"
      - "sentiment-analysis"
    model: "claude-haiku-3-20250320"
    max_tokens: 2000
    reliability_weight: 0.4

  quant_modeler:
    id: "l2-quant-modeler"
    skills:
      - "day-trading-skill"
      - "technical-analysis"
    model: "claude-haiku-3-20250320"
    max_tokens: 2000
    reliability_weight: 0.6

  risk_manager:
    id: "l2-risk-manager"
    skills:
      - "risk-management"
      - "position-sizing"
    model: "claude-haiku-3-20250320"
    max_tokens: 1500
    priority: "highest"

# L3 Executor Configuration
executors:
  data_fetcher:
    id: "l3-data-fetcher"
    timeout: 10

  backtester:
    id: "l3-backtester"
    max_duration: 300

  order_router:
    id: "l3-order-router"
    timeout: 30

# Token Budget Configuration (BudgetManager — Phase 1 Plan 02)
budget:
  session_token_limit: 100000
  daily_token_limit: 1000000
  daily_usd_limit: 5.00
  model_pricing:
    gemini-2.5-flash:
      input_per_million: 0.075
      output_per_million: 0.30


# ClawGuard Security Configuration
security:
  # Minimum weighted_consensus_score required before order execution
  min_consensus: 0.0
  # Block live execution unless explicitly set to false
  paper_trade_only: true

# Risk Management Limits
risk_limits:
  starting_capital: 1000000.0
  max_notional_exposure: 500000.0  # Max 50% of capital in open trades
  max_asset_concentration_pct: 0.20  # Max 20% per single ticker
  max_concurrent_trades: 10
  max_position_size: 0.1  # 10% of portfolio
  max_leverage: 10.0
  max_daily_loss: 0.05  # 5% of portfolio
  max_drawdown: 0.15  # 15% of portfolio
  stop_loss_required: true
  min_risk_reward: 1.5

  # VIX-based risk adjustment
  vix_thresholds:
    low: 15
    elevated: 20
    high: 30
    critical: 40

# Trading Configuration
trading:
  # Phase 3 execution mode — paper by default (CONTEXT.md decision)
  # Change to "live" only when IB Gateway / TWS is running
  execution_mode: paper   # paper | live

  default_timeframe: "1H"
  supported_assets:
    - "BTC/USDT"
    - "ETH/USDT"
    - "SOL/USDT"
    - "EUR/USD"
    - "GBP/USD"
    - "USD/JPY"

  execution_modes:
    - "paper"
    - "live"

  default_mode: "paper"

  # Interactive Brokers (live equities — Alpaca has no official NautilusTrader adapter)
  # See Phase 3 RESEARCH.md critical finding re: Alpaca RFC #3374
  interactive_brokers:
    host: "127.0.0.1"
    port_paper: 7497   # TWS paper trading port
    port_live: 7496    # TWS live trading port
    account_id: "${IB_ACCOUNT_ID}"
    client_id_data: 1
    client_id_exec: 2

  # Crypto execution adapter (primary: Binance — official NautilusTrader adapter)
  crypto_adapter: "binance"   # binance | bybit

  # Dexter fundamental research bridge configuration
  dexter:
    timeout_seconds: 90
    max_iterations: 10

  # Self-improvement trade history window (N=15, within discretion range 10-20)
  trade_history_window: 15

# Self-Improvement Framework
self_improvement:
  enabled: true
  min_trades_for_analysis: 10
  analysis_frequency: "weekly"

  # Rule generation thresholds
  prefer_threshold: 0.75
  avoid_threshold: 0.35
  caution_threshold: 0.50

  # Memory configuration
  memory_file: "data/MEMORY.md"
  max_memory_entries: 100

  # Rule validation harness (Phase 10)
  validation_lookback_days: 90
  validation_min_trades: 10

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "data/logs/swarm.log"
  max_bytes: 10485760  # 10MB
  backup_count: 5

  # Agent-specific logs
  agent_logs:
    macro: "data/logs/macro.log"
    quant: "data/logs/quant.log"
    risk: "data/logs/risk.log"
    executor: "data/logs/executor.log"

# File-Based Communication
file_protocol:
  inbox_dir: "data/inbox"
  outbox_dir: "data/outbox"
  comms_dir: "data/inter_agent_comms"

  # File naming conventions
  task_file_pattern: "{task_id}_task.json"
  proposal_file_pattern: "{task_id}_proposal.json"
  result_file_pattern: "{task_id}_result.json"
  status_file: "status.json"

# Cron Jobs
scheduled_tasks:
  macro_scan:
    enabled: true
    schedule: "0 */4 * * *"  # Every 4 hours
    description: "Periodic macro environment scan"

  weekly_review:
    enabled: true
    schedule: "0 18 * * FRI"  # Friday 6PM
    description: "Weekly performance review and memory update"

  risk_check:
    enabled: true
    schedule: "*/15 * * * *"  # Every 15 minutes
    description: "Continuous risk monitoring"

# External Integrations
integrations:
  data_sources:
    - name: "yfinance"
      priority: 1
    - name: "ccxt"
      priority: 2

  sentiment:
    - name: "finbert"
      endpoint: "https://api-inference.huggingface.co/models/ProsusAI/finbert"

  # DEPRECATED in Phase 3 — replaced by NautilusTrader execution layer
  # execution:
  #   - name: "freqtrade"
  #     api_url: "http://localhost:8080"

# Notifications
notifications:
  enabled: true
  channels:
    - "telegram"
    - "discord"

  alerts:
    trade_execution: true
    risk_breach: true
    daily_loss_threshold: true
    weekly_review_complete: true

# Phase 16: KAMI Merit Index — multi-dimensional earned merit scoring
kami:
  # Composite formula weights — must sum to 1.0
  alpha: 0.30   # Accuracy weight
  beta: 0.35    # Recovery weight
  gamma: 0.25   # Consensus weight
  delta: 0.10   # Fidelity weight
  # EMA decay rate — higher = more weight on recent signal
  lambda: 0.9
  # Cold-start and floor/ceiling
  default_merit: 0.5
  merit_floor: 0.1
  merit_ceil: 1.0
